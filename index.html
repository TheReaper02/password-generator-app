<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
  
  <title>Frontend Mentor | Password generator app</title>
</head>
<body>
  <main class="app">
    <h1 class="app__title">Password Generator</h1>

    <section class="password-output" aria-label="Generated Password">
      <output id="generated-password" class="password-output__value" aria-live="polite">P4$5W0rD!</output>
      <button id="copy-button" class="copy-button" type="button" aria-label="Copy generated password">
        <span id="copy-text" class="copy-button__text">Copied</span>
        <img src="./assets/images/icon-copy.svg" alt="" aria-hidden="true">
      </button>
    </section>

    <section class="controls" aria-label="Password options">
      <div class="length-row">
        <label for="length" class="length-row__label">Character Length</label>
        <span id="length-value" class="length-row__value">10</span>
      </div>

      <input type="range" id="length" class="length-slider" min="1" max="20" value="10">

      <fieldset class="options">
        <legend class="sr-only">Character options</legend>
        <label class="checkbox">
          <input type="checkbox" id="uppercase" checked>
          <span>Include Uppercase Letters</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="lowercase" checked>
          <span>Include Lowercase Letters</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="numbers" checked>
          <span>Include Numbers</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="symbols" checked>
          <span>Include Symbols</span>
        </label>
      </fieldset>

      <div class="strength">
        <span class="strength__label">Strength</span>
        <div class="strength__result">
          <span id="strength-text" class="strength__text">Medium</span>
          <div id="strength-bars" class="strength__bars" aria-hidden="true">
            <span class="strength__bar"></span>
            <span class="strength__bar"></span>
            <span class="strength__bar"></span>
            <span class="strength__bar"></span>
          </div>
        </div>
      </div>

      <button id="generate-button" class="generate-button" type="button">
        Generate
        <img src="./assets/images/icon-arrow-right.svg" alt="" aria-hidden="true">
      </button>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
